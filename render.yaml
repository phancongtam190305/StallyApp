services:
  - type: web
    name: stally-backend
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_MAX
        value: "5"
      - key: AUTO_PERSIST_ENABLED
        value: "true"
      - key: RELOAD_DB_ON_EVERY_REQUEST
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: EMAIL_PROVIDER
        value: gmail_api
      - key: EMAIL_ALLOW_SIMULATOR
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_FROM_NAME
        value: Stally B2B Sourcing
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: EMAIL_RECIPIENT_OVERRIDE
        sync: false
      - key: SMTP_NETWORK_FAMILY
        value: "4"
      - key: SMTP_DNS_TIMEOUT_MS
        value: "10000"
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: "15000"
      - key: SMTP_GREETING_TIMEOUT_MS
        value: "15000"
      - key: SMTP_SOCKET_TIMEOUT_MS
        value: "45000"
      - key: GMAIL_API_CLIENT_ID
        sync: false
      - key: GMAIL_API_CLIENT_SECRET
        sync: false
      - key: GMAIL_API_REFRESH_TOKEN
        sync: false
      - key: GMAIL_API_SENDER_EMAIL
        sync: false
      - key: IMAP_POLL_ENABLED
        value: "true"
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASS
        sync: false
      - key: IMAP_SECURE
        value: "true"
      - key: IMAP_MAILBOX
        value: INBOX
      - key: IMAP_POLL_INTERVAL_MS
        value: "60000"
      - key: EMAIL_ROLE_AUTH_ENABLED
        value: "true"
      - key: VITE_EMAIL_ROLE_AUTH_ENABLED
        value: "true"
      - key: GOOGLE_OAUTH_ENABLED
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_OAUTH_AUTO_PROVISION
        value: "true"
      - key: GOOGLE_OAUTH_ALLOWED_DOMAINS
        value: "gmail.com"
      - key: GOOGLE_OAUTH_DEFAULT_ROLE
        value: "requester"
      - key: SUPPLIER_DISCOVERY_ALLOW_SIMULATOR
        value: "false"
      - key: VITE_ENABLE_DEV_TOOLS
        value: "false"
